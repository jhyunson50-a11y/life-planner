<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --success: #10b981;
            --success-light: #34d399;
            --danger: #f43f5e;
            --danger-light: #fb7185;
            --navy: #1e293b;
            --navy-light: #334155;
            --text: #1e293b;
            --text-secondary: #64748b;
            --bg: #f1f5f9;
            --bg-warm: #faf5ff;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.04);
            --shadow-glow: 0 0 20px rgba(99,102,241,0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 50%, #fff1f2 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--primary-dark) 100%);
            padding: 22px 28px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-title {
            font-size: 26px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .save-badge {
            width: 12px;
            height: 12px;
            background: var(--danger);
            border-radius: 50%;
            display: none;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .save-badge.active {
            display: inline-block;
        }

        /* ── 버튼 시스템 ── */
        button {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.2px;
            position: relative;
        }

        button.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(99,102,241,0.3);
        }
        button.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(99,102,241,0.4);
        }
        button.primary:active { transform: translateY(0); }

        button.secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        button.secondary:hover {
            background: var(--border-light);
            border-color: var(--primary-light);
            color: var(--primary);
        }

        button.danger {
            background: linear-gradient(135deg, var(--danger) 0%, #e11d48 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(244,63,94,0.3);
        }
        button.danger:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(244,63,94,0.4); }

        button.success {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(16,185,129,0.3);
        }
        button.success:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16,185,129,0.4); }

        /* ── 탭 네비게이션 ── */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255,255,255,0.8);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 18px;
            background: transparent;
            color: var(--text-secondary);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.2px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 2px 10px rgba(99,102,241,0.35);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(99,102,241,0.08);
            color: var(--primary);
        }

        /* ── 메인 콘텐츠 영역 ── */
        .tab-content {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255,255,255,0.8);
            min-height: 500px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── 카드 ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 3px solid transparent;
            overflow: hidden;
        }
        /* 그리드 안의 카드는 margin 제거 (gap이 간격 처리) */
        [style*="display:grid"] > .card { margin-bottom: 0; }

        .card:hover {
            box-shadow: var(--shadow-md);
            border-left-color: var(--primary-light);
            transform: translateX(2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: -0.3px;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }

        .card-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .card-actions button {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: var(--radius-xs);
            white-space: nowrap;
        }

        .card-description {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        /* ── 뱃지 ── */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
            letter-spacing: -0.2px;
        }

        .badge-category {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            color: #0369a1;
        }

        .badge-status {
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
            color: #6d28d9;
        }

        .accordion {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
        }

        .accordion-item {
            margin-left: 16px;
            padding: 8px 12px;
            background: linear-gradient(135deg, #faf5ff 0%, #f5f3ff 100%);
            border-radius: var(--radius-xs);
            margin-bottom: 8px;
            font-size: 13px;
            border-left: 2px solid var(--primary-light);
            overflow: hidden;
        }
        .accordion-item input[type="text"] {
            min-width: 0;
        }

        .breadcrumb {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .breadcrumb span {
            color: var(--border);
        }

        /* ── 모달 ── */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
            background: #fafbfc;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
            background: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* ── 날짜 선택기 ── */
        .date-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(99,102,241,0.05) 0%, rgba(168,85,247,0.05) 100%);
            border-radius: var(--radius);
            border: 1px solid rgba(99,102,241,0.12);
        }

        .date-selector input {
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .date-selector input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
            outline: none;
        }

        .selected-date {
            font-size: 16px;
            font-weight: 700;
            color: var(--navy);
            flex: 1;
        }

        /* ── 시간표 ── */
        .timetable {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 20px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            table-layout: fixed;
        }

        .timetable th,
        .timetable td {
            border: 1px solid var(--border-light);
            padding: 4px 8px;
            text-align: left;
        }

        .timetable th {
            background: #f8fafc;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: -0.2px;
            padding: 6px 8px;
        }

        .timetable th.plan-header {
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            width: calc(50% - 25px);
        }

        .timetable th.do-header {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            width: calc(50% - 25px);
        }

        .timetable td.time-cell {
            font-weight: 700;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            width: 50px;
            color: var(--primary);
            font-size: 11px;
            text-align: center;
            padding: 2px 4px;
        }

        .timetable td.plan-cell {
            background: transparent;
            min-height: 28px;
            vertical-align: middle;
            position: relative;
            padding: 2px 4px;
        }

        .timetable td.do-cell {
            background: transparent;
            min-height: 28px;
            vertical-align: top;
            padding: 2px 4px;
        }

        /* ── 드롭존 ── */
        .drop-zone {
            border: 1.5px dashed #cbd5e1;
            border-radius: 4px;
            padding: 2px 4px;
            min-height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 10px;
            transition: all 0.2s;
            cursor: pointer;
            flex-wrap: wrap;
            gap: 2px;
        }

        .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(99,102,241,0.06);
        }

        /* ── 태스크 카드 ── */
        .task-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 6px;
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            transition: all 0.15s;
        }

        .task-card-content {
            flex: 1;
            font-size: 11px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .task-card .badge { margin: 0; font-size: 9px; padding: 0 4px; }

        .task-card button {
            padding: 1px 4px;
            font-size: 10px;
        }

        .draggable-task {
            cursor: grab;
            opacity: 0.95;
            transition: all 0.15s;
        }

        .draggable-task:hover {
            opacity: 1;
            box-shadow: var(--shadow-sm);
        }

        .draggable-task:active {
            cursor: grabbing;
            opacity: 0.8;
        }

        /* ── 상태 버튼 ── */
        .status-buttons {
            display: flex;
            gap: 3px;
            margin-bottom: 3px;
        }

        .status-btn {
            padding: 2px 5px;
            font-size: 10px;
            border: 1px solid var(--border);
            background: #fafbfc;
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
            white-space: nowrap;
        }
        .status-btn:hover {
            border-color: var(--primary-light);
            background: rgba(99,102,241,0.04);
        }

        .status-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: var(--primary);
            font-weight: 600;
        }

        .do-note {
            width: 100%;
            padding: 3px 6px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 10px;
            font-family: inherit;
            resize: none;
            min-height: 20px;
            height: 20px;
            transition: all 0.15s;
            background: #fafbfc;
        }
        .do-note:focus {
            border-color: var(--primary);
            outline: none;
            background: white;
            min-height: 36px;
            height: auto;
        }

        .result-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 16px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .result-table th,
        .result-table td {
            border: 1px solid var(--border-light);
            padding: 10px;
            text-align: left;
        }

        .result-table th {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            font-weight: 700;
            width: 33%;
            font-size: 13px;
        }

        .result-table td {
            text-align: center;
            font-weight: 600;
        }

        .achievement-rate {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin: 20px 0;
        }

        /* ── 무드 선택기 ── */
        .mood-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            justify-content: center;
        }

        .mood-btn {
            font-size: 30px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 52px;
            height: 52px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }

        .mood-btn:hover {
            transform: scale(1.15) translateY(-2px);
            border-color: var(--primary-light);
            box-shadow: var(--shadow-md);
        }

        .mood-btn.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, #ede9fe 0%, #e0e7ff 100%);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15), var(--shadow-md);
            transform: scale(1.1);
        }

        /* ── 성찰 카드 ── */
        .reflection-card {
            padding: 20px;
            background: linear-gradient(135deg, #faf5ff 0%, #fdf2f8 50%, #fff7ed 100%);
            border-radius: var(--radius);
            border: 1px solid rgba(168,85,247,0.12);
        }

        .reflection-card h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 12px;
        }

        /* ── 태스크 풀 ── */
        .task-pool {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #faf5ff 0%, #f0f4ff 50%, #f0fdf4 100%);
        }

        /* 계층 그룹 - 인생목표 레벨 */
        .pool-life-group {
            background: var(--surface);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: var(--radius-sm);
            padding: 0;
            margin-bottom: 14px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .pool-life-group:hover {
            box-shadow: var(--shadow-md);
        }
        .pool-life-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pool-life-header .pool-icon { font-size: 16px; }

        .pool-life-body {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px;
            align-items: flex-start;
        }

        /* 연간목표 레벨 */
        .pool-year-group {
            border: 1px solid rgba(99,102,241,0.15);
            flex: 1 1 280px;
            max-width: 400px;
            min-width: 220px;
            padding: 0;
            border-radius: var(--radius-xs);
            background: linear-gradient(135deg, #f5f3ff 0%, #eef2ff 100%);
            overflow: hidden;
            transition: all 0.2s;
        }
        .pool-year-group:hover {
            box-shadow: var(--shadow-sm);
        }
        .pool-year-header {
            background: linear-gradient(135deg, #e0e7ff 0%, #ddd6fe 100%);
            color: var(--primary-dark);
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 월간목표 레벨 */
        .pool-month-group {
            border-left: 3px solid var(--success);
            margin: 6px 8px;
            padding: 0;
            border-radius: var(--radius-xs);
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
            overflow: hidden;
        }
        .pool-month-header {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 할일 칩 (드래그 가능) */
        .pool-task-list {
            padding: 8px 10px 10px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .pool-task-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: grab;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            max-width: 100%;
        }
        .pool-task-chip:hover {
            border-color: var(--primary-light);
            box-shadow: 0 4px 14px rgba(99,102,241,0.18);
            transform: translateY(-2px);
        }
        .pool-task-chip:active {
            cursor: grabbing;
            opacity: 0.7;
            transform: scale(0.97);
        }
        .pool-task-chip.assigned {
            opacity: 0.4;
            text-decoration: line-through;
            border-style: dashed;
            background: #f8fafc;
        }
        .pool-task-chip .chip-icon {
            font-size: 14px;
            flex-shrink: 0;
        }
        .pool-task-chip .chip-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pool-task-chip .chip-cat {
            font-size: 10px;
            font-weight: 600;
            background: linear-gradient(135deg, #ede9fe 0%, #e0e7ff 100%);
            color: var(--primary-dark);
            padding: 2px 8px;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .pool-task-chip .chip-status {
            font-size: 11px;
            flex-shrink: 0;
        }
        .pool-task-chip .chip-time {
            font-size: 10px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        /* 미분류 (orphan) 영역 */
        .pool-orphan-group {
            background: var(--surface);
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-sm);
            padding: 0;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .pool-orphan-header {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: var(--text-secondary);
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 요약 바 */
        .pool-summary-bar {
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 10px 16px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }
        .pool-summary-bar .summary-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        /* 기존 테이블 스타일 */
        .task-pool-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: var(--radius-xs);
            overflow: hidden;
        }
        .task-pool-table th,
        .task-pool-table td {
            border: 1px solid var(--border-light);
            padding: 8px;
            font-size: 13px;
            text-align: left;
        }
        .task-pool-table th {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            font-weight: 700;
        }
        .task-pool-table td {
            background: var(--surface);
        }
        .task-pool-row {
            cursor: grab;
            transition: all 0.2s;
        }
        .task-pool-row:hover {
            background: rgba(99,102,241,0.04);
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* ── 모바일 반응형 ── */
        @media (max-width: 768px) {
            body { font-size: 14px; }
            .container { padding: 10px; }

            header {
                flex-direction: column;
                text-align: center;
                padding: 16px;
                gap: 10px;
            }
            .header-title { font-size: 20px; }
            .header-actions {
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
            }
            .header-actions button { font-size: 11px; padding: 6px 10px; }

            .tabs {
                gap: 4px;
                padding: 6px;
                justify-content: center;
            }
            .tab-btn {
                padding: 8px 10px;
                font-size: 11px;
                flex: 0 0 auto;
            }

            .tab-content { padding: 14px; }
            .two-column { grid-template-columns: 1fr; }
            .status-buttons { grid-template-columns: 1fr 1fr; }

            /* 날짜 선택기 */
            .date-selector {
                flex-wrap: wrap;
                padding: 10px;
                gap: 6px;
                justify-content: center;
            }
            .date-selector input { font-size: 13px; padding: 6px 8px; }
            .selected-date { font-size: 14px; text-align: center; flex-basis: 100%; }

            /* 카드 */
            .card { padding: 12px; }
            .card-title { font-size: 14px; }
            .card-actions { flex-wrap: wrap; }
            .card-actions button { padding: 4px 8px; font-size: 11px; }

            /* 시간표 → 모바일 카드 뷰 */
            .timetable { display: block; border: none; box-shadow: none; }
            .timetable thead { display: none; }
            .timetable tbody { display: flex; flex-direction: column; gap: 8px; }
            .timetable tr {
                display: grid;
                grid-template-columns: 60px 1fr;
                grid-template-rows: auto auto;
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                overflow: hidden;
                background: var(--surface);
                box-shadow: var(--shadow-sm);
            }
            .timetable td.time-cell {
                grid-row: 1 / 3;
                grid-column: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                font-weight: 800;
                background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
                color: white;
                width: auto;
                padding: 8px;
                border: none;
            }
            .timetable td.plan-cell {
                grid-row: 1;
                grid-column: 2;
                border: none;
                border-bottom: 1px dashed var(--border-light);
                padding: 8px;
                min-height: 40px;
            }
            .timetable td.plan-cell::before {
                content: 'PLAN';
                display: inline-block;
                font-size: 9px;
                font-weight: 700;
                color: var(--primary);
                background: rgba(99,102,241,0.08);
                padding: 1px 6px;
                border-radius: 4px;
                margin-bottom: 4px;
                margin-right: 4px;
            }
            .timetable td.do-cell {
                grid-row: 2;
                grid-column: 2;
                border: none;
                padding: 8px;
                min-height: 40px;
            }
            .timetable td.do-cell::before {
                content: 'DO';
                display: inline-block;
                font-size: 9px;
                font-weight: 700;
                color: var(--success);
                background: rgba(16,185,129,0.08);
                padding: 1px 6px;
                border-radius: 4px;
                margin-bottom: 4px;
                margin-right: 4px;
            }

            /* 드롭존 */
            .drop-zone { min-height: 36px; font-size: 11px; padding: 6px; }

            /* 태스크 풀 계층 */
            .task-pool { padding: 10px; }
            .pool-life-body { padding: 8px; gap: 8px; }
            .pool-year-group { flex: 1 1 100%; max-width: 100%; min-width: 0; }
            .pool-task-chip { font-size: 12px; padding: 5px 10px; }

            /* DO 영역 */
            .status-btn { font-size: 11px; padding: 5px 6px; }
            .do-note { font-size: 11px; min-height: 32px; }

            /* 통계 */
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-card { padding: 12px; }
            .stat-number { font-size: 24px; }

            /* 프로젝트 테이블 → 모바일 카드 */
            .proj-table-wrap { box-shadow: none; border: none; overflow: visible; }
            .proj-table { display: block; }
            .proj-table thead { display: none; }
            .proj-table tbody { display: flex; flex-direction: column; gap: 10px; }
            .proj-table tr {
                display: flex;
                flex-wrap: wrap;
                gap: 6px 12px;
                padding: 14px;
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                background: var(--surface);
                box-shadow: var(--shadow-sm);
                border-left: 4px solid var(--primary-light);
            }
            .proj-table td {
                border: none;
                padding: 0;
                background: transparent;
                font-size: 12px;
            }
            .proj-table td:nth-child(2) { /* 고객사 */
                flex-basis: 100%;
                font-size: 15px;
                font-weight: 800;
                color: var(--navy);
                order: -3;
            }
            .proj-table td:nth-child(4) { /* 프로젝트명 */
                flex-basis: 100%;
                font-size: 13px;
                color: var(--text-secondary);
                order: -2;
                margin-bottom: 4px;
            }
            .proj-table td:nth-child(6) { order: -1; } /* 진행상태 */
            .proj-table td:nth-child(13) { /* 관리 버튼 */
                flex-basis: 100%;
                display: flex;
                justify-content: flex-end;
                margin-top: 4px;
                padding-top: 8px;
                border-top: 1px solid var(--border-light);
            }

            /* 프로젝트 요약 카드 */
            .proj-summary-cards { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .proj-summary-card { padding: 10px; }
            .proj-summary-card .psc-num { font-size: 18px; }
            .proj-summary-card .psc-label { font-size: 10px; }

            /* 프로젝트 필터 */
            .proj-filter-bar { gap: 6px; }
            .proj-filter-bar input, .proj-filter-bar select { font-size: 11px; padding: 6px 8px; }

            /* 모달 */
            .modal-content { padding: 18px; width: 95%; max-height: 85vh; }
            .modal-content div[style*="grid-template-columns: 1fr 1fr"] {
                grid-template-columns: 1fr !important;
            }

            /* 성찰 카드 */
            .mood-btn { width: 42px; height: 42px; font-size: 24px; }
            .reflection-card { padding: 14px; }
        }

        /* 더 작은 화면 (375px 이하) */
        @media (max-width: 420px) {
            .tabs { gap: 3px; padding: 5px; }
            .tab-btn { padding: 6px 7px; font-size: 10px; }
            .header-title { font-size: 18px; }
            .proj-summary-cards { grid-template-columns: repeat(2, 1fr); }
            .stats-grid { grid-template-columns: 1fr; }
            .timetable td.time-cell { font-size: 12px; }
        }

        .task-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .task-filters select {
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
            background: #fafbfc;
        }
        .task-filters select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
            outline: none;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 18px;
            text-align: center;
            transition: all 0.25s;
            box-shadow: var(--shadow-sm);
        }
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .stat-card h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
            margin-top: 20px;
        }

        /* ── 스크롤바 커스텀 ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ── 선택 효과 ── */
        ::selection { background: rgba(99,102,241,0.15); }

        /* ── 프로젝트 탭 ── */
        .proj-table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .proj-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
        }
        .proj-table th {
            background: linear-gradient(135deg, var(--navy) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 12px 14px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.3px;
            text-align: left;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        .proj-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
        .proj-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
        .proj-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
            background: var(--surface);
            transition: background 0.15s;
        }
        .proj-table tr:hover td {
            background: rgba(99,102,241,0.03);
        }
        .proj-table tr:last-child td:first-child { border-radius: 0 0 0 var(--radius-sm); }
        .proj-table tr:last-child td:last-child { border-radius: 0 0 var(--radius-sm) 0; }

        .proj-status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .proj-status-badge.st-proposal { background: #ede9fe; color: #6d28d9; }
        .proj-status-badge.st-negotiation { background: #fef3c7; color: #92400e; }
        .proj-status-badge.st-engaged { background: #d1fae5; color: #065f46; }
        .proj-status-badge.st-inprogress { background: #dbeafe; color: #1e40af; }
        .proj-status-badge.st-review { background: #fce7f3; color: #9d174d; }
        .proj-status-badge.st-completed { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
        .proj-status-badge.st-lost { background: #f1f5f9; color: #64748b; }
        .proj-status-badge.st-hold { background: #fff7ed; color: #9a3412; }

        .proj-priority-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        .proj-filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .proj-filter-bar select, .proj-filter-bar input {
            padding: 7px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 12px;
            background: #fafbfc;
            transition: all 0.2s;
        }
        .proj-filter-bar select:focus, .proj-filter-bar input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
            outline: none;
        }

        .proj-summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .proj-summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .proj-summary-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .proj-summary-card .psc-num {
            font-size: 24px;
            font-weight: 800;
            display: block;
            margin-bottom: 2px;
        }
        .proj-summary-card .psc-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }
    </style>

<body>
    <div class="container">
        <header>
            <div class="header-title">Life Planner</div>
            <div class="header-actions">
                <div class="save-badge" id="saveBadge"></div>
                <span id="autoSaveMsg" style="font-size:11px;color:#a5f3fc;display:none;font-weight:500;">✓ 자동저장됨</span>
                <button class="primary" onclick="app.gistSync('upload')" title="GitHub 클라우드 저장">☁️ 업로드</button>
                <button class="primary" onclick="app.gistSync('download')" title="GitHub 클라우드 불러오기" style="background:linear-gradient(135deg,#10b981,#059669);">📥 다운로드</button>
                <button class="secondary" onclick="app.gistSetup()" style="font-size:11px;padding:6px 10px;">⚙️ 동기화설정</button>
                <button class="secondary" onclick="app.saveToFile()" style="font-size:11px;padding:6px 10px;">💾 내보내기</button>
                <button class="secondary" onclick="app.importFromFile()" style="font-size:11px;padding:6px 10px;">📂 가져오기</button>
                <button class="success" onclick="app.setAsDefault()" style="font-size:11px;padding:6px 10px;">📌 기본값</button>
                <button class="danger" onclick="app.resetData()" style="font-size:11px;padding:6px 10px;">🔄 초기화</button>
            </div>
        </header>

        <div class="tabs" id="tabs">
            <button class="tab-btn active" onclick="app.switchTab('life')">🎯 인생목표</button>
            <button class="tab-btn" onclick="app.switchTab('year')">📅 연간목표</button>
            <button class="tab-btn" onclick="app.switchTab('month')">📆 월간목표</button>
            <button class="tab-btn" onclick="app.switchTab('daily')">📋 일간계획</button>
            <button class="tab-btn" onclick="app.switchTab('task')">✅ Task 관리</button>
            <button class="tab-btn" onclick="app.switchTab('stats')">📊 통계</button>
            <button class="tab-btn" onclick="app.switchTab('project')">💼 프로젝트</button>
        </div>

        <div class="tab-content" id="tab-content"></div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <div class="modal-header">항목 추가/수정</div>
            <form id="itemForm">
                <div class="form-group">
                    <label>제목 *</label>
                    <input type="text" id="itemTitle" required>
                </div>
                <div class="form-group">
                    <label>설명</label>
                    <textarea id="itemDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>카테고리</label>
                    <select id="itemCategory" onchange="app.handleCategoryChange()">
                        <option value="감사">감사</option>
                        <option value="세무">세무</option>
                        <option value="컨설팅">컨설팅</option>
                        <option value="평가">평가</option>
                        <option value="실사">실사</option>
                        <option value="사업">사업</option>
                        <option value="자기개발">자기개발</option>
                        <option value="투자">투자</option>
                        <option value="건강">건강</option>
                        <option value="운동">운동</option>
                        <option value="수면">수면</option>
                        <option value="식사">식사</option>
                        <option value="가족">가족</option>
                        <option value="일정관리">일정관리</option>
                        <option value="기타">기타</option>
                        <option value="__custom__">직접입력...</option>
                    </select>
                    <input type="text" id="itemCategoryCustom" placeholder="카테고리를 직접 입력하세요" style="display:none; margin-top:6px;">
                </div>
                <div class="form-group">
                    <label>태그 (쉼표로 구분)</label>
                    <input type="text" id="itemTags">
                </div>
                <div class="form-group">
                    <label>대상 날짜</label>
                    <input type="date" id="itemTargetDate">
                </div>
                <div class="form-group">
                    <label>상태</label>
                    <select id="itemStatus">
                        <option value="active">진행중</option>
                        <option value="completed">완료</option>
                        <option value="paused">일시중지</option>
                        <option value="cancelled">취소</option>
                    </select>
                </div>
                <div id="levelSpecificFields"></div>
                <div class="modal-footer">
                    <button type="button" class="secondary" onclick="app.closeModal()">취소</button>
                    <button type="button" class="primary" onclick="app.saveItem()">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Batch Design Modal -->
    <div class="modal" id="batchModal">
        <div class="modal-content">
            <div class="modal-header">일괄 설계</div>
            <form id="batchForm">
                <div id="batchParentInfo"></div>
                <div class="form-group">
                    <label>항목 목록 (각 줄: 제목 | 설명 | 카테고리)</label>
                    <textarea id="batchInput" placeholder="제목1 | 설명1 | 카테고리1&#10;제목2 | 설명2 | 카테고리2"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="secondary" onclick="app.closeModal()">취소</button>
                    <button type="button" class="secondary" onclick="app.previewBatch()">미리보기</button>
                    <button type="button" class="primary" onclick="app.saveBatch()">일괄 생성</button>
                </div>
            </form>
        </div>
    </div>

            <div class="modal-header">삭제 확인</div>

                <button type="button" class="secondary" onclick="app.closeModal()">취소</button>
                <button type="button" class="danger" onclick="app.confirmDelete()">삭제</button>

    <!-- Plan entry modal: what will you do? -->
    <div class="modal" id="planEntryModal">
        <div class="modal-content" style="max-width:480px;">
            <div class="modal-header">📋 이 시간에 할 일 기재</div>

                <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">할 일 내용</label>
                <textarea id="planEntryText" rows="3" style="width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px;font-size:13px;font-family:inherit;resize:vertical;" placeholder="이 시간에 무엇을 할 예정인가요?"></textarea>

                <button type="button" class="primary" style="background:#6366f1;" onclick="app.confirmPlanEntryDirect()">일계획 그대로 배치</button>

            </div>

    <!-- File input for import (hidden) -->
    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <script>
        // 인스턴스별 고유 ID → localStorage 키 분리 (파일 복사해도 데이터 독립)
        var _instanceId = (function() {
            // URL 경로 기반으로 고유 키 생성 (같은 파일 = 같은 키)
            var path = location.pathname || 'default';
            var hash = 0;
            for (var i = 0; i < path.length; i++) {
                hash = ((hash << 5) - hash) + path.charCodeAt(i);
                hash |= 0;
            }
            return 'lp_' + Math.abs(hash).toString(36);
        })();
        function _lsKey(base) { return _instanceId + '_' + base; }

        const app = {
            items: [],
            currentTab: 'life',
            editingId: null,
            deleteTargetId: null,
            nightCollapsed: true,
            selectedDate: (function(){ var d = new Date(); d.setHours(0,0,0,0); return d; })(),
            selectedYear: new Date().getFullYear(),
            selectedMonthYear: new Date().getFullYear(),
            selectedMonthMonth: new Date().getMonth() + 1,
            batchParentId: null,
            charts: {},
            reflections: {},  // 날짜별 성찰 데이터
            projects: [],     // 프로젝트 추진현황
            projectEditId: null,

            init: function() {
                // 기존 키 → 인스턴스 키 마이그레이션 (최초 1회)
                this._migrateOldKeys();

                // localStorage에서 데이터 로드, 없으면 샘플 생성
                var saved = null;
                try { saved = localStorage.getItem(_lsKey('data')); } catch(e) {}

                if (saved) {
                    try {
                        var parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            this.items = parsed;
                        } else {
                            this.generateSampleData();
                        }
                    } catch(e) {
                        this.generateSampleData();
                    }
                } else {
                    this.generateSampleData();
                }

                // 성찰 데이터 로드
                try {
                    var refSaved = localStorage.getItem(_lsKey('reflections'));
                    if (refSaved) this.reflections = JSON.parse(refSaved) || {};
                } catch(e) { this.reflections = {}; }

                // 프로젝트 데이터 로드
                try {
                    var projSaved = localStorage.getItem(_lsKey('projects'));
                    if (projSaved) this.projects = JSON.parse(projSaved) || [];
                } catch(e) { this.projects = []; }

                // 같은 폴더의 JSON 데이터 파일 자동 로드 시도 (OneDrive 동기화용)
                this._tryLoadJsonFile();

                this.render();
                document.getElementById('saveBadge').classList.remove('active');

                // GitHub Gist 자동 동기화: 앱 시작 시 클라우드 데이터 확인
                this._autoSyncOnLoad();

                // 최초 방문 감지 → 데이터 불러오기 안내 배너
                this._showSyncBannerIfNeeded();
            },

            // 기존 localStorage 키 → 인스턴스 키로 마이그레이션
            _migrateOldKeys: function() {
                try {
                    if (localStorage.getItem(_lsKey('data'))) return; // 이미 마이그레이션 완료
                    var oldKeys = [
                        ['lifePlannerData', 'data'],
                        ['lifePlannerReflections', 'reflections'],
                        ['lifePlannerProjects', 'projects'],
                        ['lifePlannerLastSync', 'lastSync'],
                        ['lifePlannerDefault', 'default'],
                        ['lifePlannerReflectionsDefault', 'reflectionsDefault'],
                        ['lifePlannerProjectsDefault', 'projectsDefault']
                    ];
                    var migrated = false;
                    oldKeys.forEach(function(pair) {
                        var val = localStorage.getItem(pair[0]);
                        if (val) {
                            localStorage.setItem(_lsKey(pair[1]), val);
                            migrated = true;
                        }
                    });
                    // 마이그레이션 성공 시 기존 키 제거
                    if (migrated) {
                        oldKeys.forEach(function(pair) { localStorage.removeItem(pair[0]); });
                    }
                } catch(e) { console.warn('마이그레이션 실패:', e); }
            },

            _showSyncBannerIfNeeded: function() {
                var self = this;
                var hasSync = false;
                try { hasSync = !!localStorage.getItem(_lsKey('lastSync')); } catch(e) {}
                var hasSaved = false;
                try { hasSaved = !!localStorage.getItem(_lsKey('data')); } catch(e) {}

                // 동기화 이력 없고, 저장된 진짜 데이터도 없으면 배너 표시
                if (hasSync) return;

                // 약간의 딜레이 (fetch로 자동 로드 성공할 수 있으므로)
                setTimeout(function() {
                    // 이미 동기화 되었으면 무시
                    try { if (localStorage.getItem(_lsKey('lastSync'))) return; } catch(e) {}

                    var banner = document.createElement('div');
                    banner.id = 'syncBanner';
                    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:999;' +
                        'background:linear-gradient(135deg,#1e293b 0%,#4f46e5 100%);' +
                        'color:white;padding:16px 20px;display:flex;flex-wrap:wrap;gap:10px;' +
                        'align-items:center;justify-content:center;box-shadow:0 -4px 20px rgba(0,0,0,0.2);' +
                        'animation:slideUp 0.4s cubic-bezier(0.4,0,0.2,1);';

                    var style = document.createElement('style');
                    style.textContent = '@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}';
                    document.head.appendChild(style);

                    var msg = document.createElement('span');
                    msg.style.cssText = 'font-size:13px;font-weight:500;flex:1;min-width:200px;';
                    msg.innerHTML = '📱 <b>다른 기기의 데이터를 불러오시겠습니까?</b><br>' +
                        '<span style="font-size:11px;opacity:0.8;">PC에서 동기화한 life-planner-data.json 파일을 선택하세요</span>';
                    banner.appendChild(msg);

                    var loadBtn = document.createElement('button');
                    loadBtn.style.cssText = 'padding:10px 20px;background:white;color:#4f46e5;border:none;' +
                        'border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;' +
                        'box-shadow:0 2px 8px rgba(0,0,0,0.15);';
                    loadBtn.textContent = '📂 데이터 불러오기';
                    loadBtn.onclick = function() {
                        self.loadFromJsonFile();
                        banner.remove();
                    };
                    banner.appendChild(loadBtn);

                    var closeBtn = document.createElement('button');
                    closeBtn.style.cssText = 'padding:8px 14px;background:rgba(255,255,255,0.15);color:white;' +
                        'border:1px solid rgba(255,255,255,0.3);border-radius:10px;font-size:12px;cursor:pointer;';
                    closeBtn.textContent = '새로 시작';
                    closeBtn.onclick = function() {
                        banner.remove();
                        try { localStorage.setItem(_lsKey('lastSync'), 'new-device'); } catch(e) {}
                    };
                    banner.appendChild(closeBtn);

                    document.body.appendChild(banner);
                }, 1500);
            },

            // ══════════════════════════════════════════════════
            // OneDrive 동기화: IndexedDB에 파일 핸들 영구 저장
            // ══════════════════════════════════════════════════
            _fileHandle: null,
            _DB_NAME: 'LifePlannerSync_' + _instanceId,
            _DB_STORE: 'handles',

            // IndexedDB 열기
            _openDB: function() {
                var dbName = this._DB_NAME;
                return new Promise(function(resolve, reject) {
                    var req = indexedDB.open(dbName, 1);
                    req.onupgradeneeded = function(e) {
                        var db = e.target.result;
                        if (!db.objectStoreNames.contains('handles')) {
                            db.createObjectStore('handles');
                        }
                    };
                    req.onsuccess = function(e) { resolve(e.target.result); };
                    req.onerror = function() { reject(req.error); };
                });
            },

            // IndexedDB에 파일 핸들 저장
            _saveHandleToDB: function(handle) {
                this._openDB().then(function(db) {
                    var tx = db.transaction('handles', 'readwrite');
                    tx.objectStore('handles').put(handle, 'syncFile');
                }).catch(function() {});
            },

            // IndexedDB에서 파일 핸들 복원
            _loadHandleFromDB: function() {
                var self = this;
                return this._openDB().then(function(db) {
                    return new Promise(function(resolve) {
                        var tx = db.transaction('handles', 'readonly');
                        var req = tx.objectStore('handles').get('syncFile');
                        req.onsuccess = function() { resolve(req.result || null); };
                        req.onerror = function() { resolve(null); };
                    });
                }).catch(function() { return null; });
            },

            // 같은 폴더의 JSON 파일 자동 로드 시도
            _tryLoadJsonFile: function() {
                var self = this;

                // 1) IndexedDB에서 저장된 핸들 복원 시도
                this._loadHandleFromDB().then(function(handle) {
                    if (handle) {
                        // 권한 확인 후 핸들 복원
                        handle.queryPermission({ mode: 'readwrite' }).then(function(perm) {
                            if (perm === 'granted') {
                                self._fileHandle = handle;
                                console.log('[Sync] 저장된 파일 핸들 복원됨 (자동 동기화 가능)');
                                // 핸들에서 데이터 읽기
                                self._readFromHandle(handle);
                            }
                        }).catch(function() {});
                    }
                }).catch(function() {});

                // 2) fetch 폴백: 같은 경로의 JSON 시도
                fetch('life-planner-data.json?t=' + Date.now())
                    .then(function(resp) {
                        if (!resp.ok) throw new Error('not found');
                        return resp.json();
                    })
                    .then(function(data) {
                        if (!data || !data.items) return;
                        var localTs = null;
                        try { localTs = localStorage.getItem(_lsKey('lastSync')); } catch(e) {}
                        if (data.exportDate && (!localTs || data.exportDate > localTs)) {
                            self.items = data.items;
                            if (data.reflections) self.reflections = data.reflections;
                            if (data.projects) self.projects = data.projects;
                            self.autoSave();
                            try { localStorage.setItem(_lsKey('lastSync'), data.exportDate); } catch(e) {}
                            self.render();
                            console.log('[Sync] JSON fetch 로드 완료:', data.exportDate);
                        }
                    })
                    .catch(function() {});
            },

            // 핸들에서 파일 읽기
            _readFromHandle: function(handle) {
                var self = this;
                handle.getFile().then(function(file) {
                    return file.text();
                }).then(function(text) {
                    var data = JSON.parse(text);
                    if (!data || !data.items) return;
                    var localTs = null;
                    try { localTs = localStorage.getItem(_lsKey('lastSync')); } catch(e) {}
                    if (data.exportDate && (!localTs || data.exportDate > localTs)) {
                        self.items = data.items;
                        if (data.reflections) self.reflections = data.reflections;
                        if (data.projects) self.projects = data.projects;
                        self.autoSave();
                        try { localStorage.setItem(_lsKey('lastSync'), data.exportDate); } catch(e) {}
                        self.render();
                        console.log('[Sync] 핸들에서 데이터 로드 완료:', data.exportDate);
                    }
                }).catch(function() {});
            },

            // ☁️ GitHub Gist 동기화
            gistSetup: function() {
                var token = localStorage.getItem('gist_token') || '';
                var gistId = localStorage.getItem('gist_id') || '';
                var newToken = prompt(
                    '⚙️ GitHub 동기화 설정\n\n' +
                    'GitHub Personal Access Token을 입력하세요.\n' +
                    '(github_pat_ 로 시작하는 문자열)\n\n' +
                    '현재 토큰: ' + (token ? '✅ 설정됨' : '❌ 미설정') + '\n' +
                    '현재 Gist: ' + (gistId ? '✅ 연결됨' : '❌ 미연결'),
                    token
                );
                if (newToken === null) return;
                if (newToken.trim()) {
                    localStorage.setItem('gist_token', newToken.trim());
                    if (!gistId) {
                        // Gist ID 없으면 → 기존 Gist 자동 검색 후 없으면 새로 생성
                        this._findOrCreateGist(newToken.trim());
                    } else {
                        alert('✅ 토큰이 저장되었습니다.\n\n☁️ 업로드/📥 다운로드 버튼으로 동기화하세요.');
                    }
                } else {
                    localStorage.removeItem('gist_token');
                    localStorage.removeItem('gist_id');
                    alert('동기화 설정이 초기화되었습니다.');
                }
            },

            _findOrCreateGist: function(token) {
                var self = this;
                // 1단계: 내 Gist 목록에서 'Life Planner Data Sync' 검색
                fetch('https://api.github.com/gists?per_page=100', {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                }).then(function(gists) {
                    // life-planner-data.json 파일이 있는 Gist 찾기
                    var found = null;
                    for (var i = 0; i < gists.length; i++) {
                        if (gists[i].files && gists[i].files['life-planner-data.json']) {
                            found = gists[i];
                            break;
                        }
                    }
                    if (found) {
                        localStorage.setItem('gist_id', found.id);
                        var updatedAt = new Date(found.updated_at).toLocaleString('ko-KR');
                        alert('✅ 기존 동기화 데이터를 자동으로 찾았습니다!\n\n' +
                            '마지막 업데이트: ' + updatedAt + '\n\n' +
                            '📥 다운로드 버튼으로 데이터를 불러오세요.');
                    } else {
                        // 못 찾으면 새로 생성
                        self._createGist(token);
                    }
                }).catch(function(e) {
                    alert('❌ Gist 검색 실패: ' + e.message + '\n\n새 Gist를 생성합니다.');
                    self._createGist(token);
                });
            },

            _createGist: function(token) {
                var self = this;
                var data = {
                    description: 'Life Planner Data Sync',
                    public: false,
                    files: {
                        'life-planner-data.json': {
                            content: JSON.stringify({ items: [], reflections: {}, projects: [], exportDate: new Date().toISOString() })
                        }
                    }
                };
                fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                }).then(function(r) { return r.json(); })
                .then(function(gist) {
                    if (gist.id) {
                        localStorage.setItem('gist_id', gist.id);
                        alert('✅ 동기화 설정 완료!\n\n새 Gist가 생성되었습니다.\n☁️ 업로드 버튼으로 데이터를 저장하세요.');
                    } else {
                        alert('❌ Gist 생성 실패\n\n토큰을 확인해주세요.\n' + (gist.message || ''));
                    }
                }).catch(function(e) {
                    alert('❌ 네트워크 오류: ' + e.message);
                });
            },

            gistSync: function(mode) {
                var token = localStorage.getItem('gist_token');
                var gistId = localStorage.getItem('gist_id');
                if (!token || !gistId) {
                    alert('⚙️ 먼저 동기화 설정을 해주세요.\n\n[동기화설정] 버튼을 눌러 GitHub 토큰을 입력하세요.');
                    return;
                }
                if (mode === 'upload') {
                    this._gistUpload(token, gistId);
                } else {
                    this._gistDownload(token, gistId);
                }
            },

            _gistUpload: function(token, gistId) {
                var self = this;
                var exportData = {
                    items: this.items,
                    reflections: this.reflections,
                    projects: this.projects,
                    exportDate: new Date().toISOString(),
                    device: navigator.userAgent.indexOf('Mobile') > -1 ? 'mobile' : 'PC'
                };
                var data = {
                    files: {
                        'life-planner-data.json': {
                            content: JSON.stringify(exportData)
                        }
                    }
                };
                fetch('https://api.github.com/gists/' + gistId, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                }).then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                }).then(function() {
                    try { localStorage.setItem(_lsKey('lastSync'), new Date().toISOString()); } catch(e) {}
                    self._showSyncMsg();
                    var msg = document.getElementById('autoSaveMsg');
                    if (msg) {
                        msg.style.display = 'inline';
                        msg.textContent = '☁️ 업로드 완료 ' + new Date().toLocaleTimeString('ko-KR');
                    }
                }).catch(function(e) {
                    alert('❌ 업로드 실패: ' + e.message + '\n\n토큰 또는 Gist ID를 확인해주세요.');
                });
            },

            _gistDownload: function(token, gistId) {
                var self = this;
                fetch('https://api.github.com/gists/' + gistId, {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                }).then(function(gist) {
                    var file = gist.files['life-planner-data.json'];
                    if (!file) throw new Error('데이터 파일을 찾을 수 없습니다.');
                    var data = JSON.parse(file.content);
                    var remoteDate = data.exportDate ? new Date(data.exportDate).toLocaleString('ko-KR') : '알 수 없음';
                    var remoteDevice = data.device || '알 수 없음';
                    var itemCount = (data.items || []).length;
                    if (!confirm(
                        '📥 클라우드 데이터 불러오기\n\n' +
                        '저장 시각: ' + remoteDate + '\n' +
                        '저장 기기: ' + remoteDevice + '\n' +
                        '항목 수: ' + itemCount + '건\n\n' +
                        '현재 기기의 데이터를 덮어씁니다.\n계속하시겠습니까?'
                    )) return;
                    if (Array.isArray(data.items)) self.items = data.items;
                    if (data.reflections) self.reflections = data.reflections;
                    if (Array.isArray(data.projects)) self.projects = data.projects;
                    self.autoSave();
                    self.render();
                    var msg = document.getElementById('autoSaveMsg');
                    if (msg) {
                        msg.style.display = 'inline';
                        msg.textContent = '📥 다운로드 완료 ' + new Date().toLocaleTimeString('ko-KR');
                    }
                    alert('✅ 데이터를 성공적으로 불러왔습니다!');
                }).catch(function(e) {
                    alert('❌ 다운로드 실패: ' + e.message);
                });
            },

            // ☁️ (레거시) OneDrive 동기화 버튼 핸들러
            syncToFile: function() {
                var self = this;

                // 안전 검사: 데이터가 비어있거나 동기화 이력이 없으면 경고
                var hasSync = false;
                try { hasSync = !!localStorage.getItem(_lsKey('lastSync')); } catch(e) {}
                var realItemCount = this.items.filter(function(i) { return i.level !== undefined; }).length;

                if (!hasSync && realItemCount < 3) {
                    var choice = confirm(
                        '⚠️ 현재 데이터가 비어있거나 샘플 상태입니다.\n\n' +
                        '이대로 동기화하면 기존 JSON 파일을 덮어쓸 수 있습니다.\n\n' +
                        '다른 기기의 데이터를 불러오시려면 [취소] 후\n' +
                        '📥 가져오기 버튼을 사용하세요.\n\n' +
                        '그래도 현재 데이터로 동기화하시겠습니까?'
                    );
                    if (!choice) return;
                }

                var exportData = {
                    items: this.items,
                    reflections: this.reflections,
                    projects: this.projects,
                    exportDate: new Date().toISOString()
                };
                var json = JSON.stringify(exportData, null, 2);

                if (!window.showSaveFilePicker) {
                    // 모바일: 바로 다운로드
                    self._downloadFallback(json);
                    return;
                }

                // 이미 핸들이 있으면 → 권한 확인 후 바로 쓰기 (대화창 없음)
                if (this._fileHandle) {
                    this._fileHandle.queryPermission({ mode: 'readwrite' }).then(function(perm) {
                        if (perm === 'granted') {
                            return self._writeToHandle(self._fileHandle, json);
                        }
                        // 권한 재요청
                        return self._fileHandle.requestPermission({ mode: 'readwrite' }).then(function(p2) {
                            if (p2 === 'granted') return self._writeToHandle(self._fileHandle, json);
                            throw new Error('denied');
                        });
                    }).catch(function() {
                        // 핸들 무효 → 새로 선택
                        self._fileHandle = null;
                        self._pickAndSave(json);
                    });
                    return;
                }

                // 핸들 없으면 → IndexedDB에서 복원 시도
                this._loadHandleFromDB().then(function(handle) {
                    if (handle) {
                        return handle.requestPermission({ mode: 'readwrite' }).then(function(perm) {
                            if (perm === 'granted') {
                                self._fileHandle = handle;
                                return self._writeToHandle(handle, json);
                            }
                            throw new Error('denied');
                        });
                    }
                    throw new Error('no handle');
                }).catch(function() {
                    // 최초 1회: 파일 선택 대화창
                    self._pickAndSave(json);
                });
            },

            // 최초 1회만 호출: 파일 위치 선택
            _pickAndSave: function(json) {
                var self = this;
                var opts = {
                    suggestedName: 'life-planner-data.json',
                    types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
                };
                window.showSaveFilePicker(opts).then(function(handle) {
                    self._fileHandle = handle;
                    self._saveHandleToDB(handle); // IndexedDB에 영구 저장
                    return self._writeToHandle(handle, json);
                }).catch(function(e) {
                    if (e.name !== 'AbortError') console.warn('파일 저장 실패:', e);
                });
            },

            _writeToHandle: function(handle, json) {
                var self = this;
                return handle.createWritable().then(function(writable) {
                    return writable.write(json).then(function() {
                        return writable.close();
                    });
                }).then(function() {
                    try { localStorage.setItem(_lsKey('lastSync'), new Date().toISOString()); } catch(e) {}
                    self._showSyncMsg();
                }).catch(function(e) {
                    console.warn('파일 쓰기 실패:', e);
                    // 핸들 무효화 → 다음에 새로 선택
                    self._fileHandle = null;
                });
            },

            _showSyncMsg: function() {
                var msg = document.getElementById('autoSaveMsg');
                if (msg) {
                    msg.style.display = 'inline';
                    msg.textContent = '☁️ 동기화 완료 ' + new Date().toLocaleTimeString('ko-KR');
                    clearTimeout(this._saveTimer);
                    this._saveTimer = setTimeout(function() { msg.style.display = 'none'; }, 4000);
                }
            },

            _downloadFallback: function(json) {
                var blob = new Blob([json], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'life-planner-data.json';
                a.click();
                URL.revokeObjectURL(url);
                try { localStorage.setItem(_lsKey('lastSync'), new Date().toISOString()); } catch(e) {}
                this._showSyncMsg();
            },

                var copyBtn = document.createElement('button');

                copyBtn.onclick = function() {
