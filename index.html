            // 공유 시도 (여러 파일 타입으로 폴백)
            _tryShareFile: function(json) {
                var self = this;

                // 1차: application/json으로 시도
                var file1 = new File([json], 'life-planner-data.json', { type: 'application/json' });
                if (navigator.canShare && navigator.canShare({ files: [file1] })) {
                    navigator.share({ files: [file1] }).then(function() {
                        try { localStorage.setItem(_lsKey('lastSync'), new Date().toISOString()); } catch(x) {}
                        self._showSyncMsg();
                    }).catch(function(e) {
                        if (e.name !== 'AbortError') self._tryShareAsText(json);
                    });
                    return;
                }

                // 2차: text/plain으로 시도
                this._tryShareAsText(json);
            },

            _tryShareAsText: function(json) {
                var self = this;
                var file2 = new File([json], 'life-planner-data.json', { type: 'text/plain' });
                if (navigator.canShare && navigator.canShare({ files: [file2] })) {
                    navigator.share({ files: [file2] }).then(function() {
                        try { localStorage.setItem(_lsKey('lastSync'), new Date().toISOString()); } catch(x) {}
                        self._showSyncMsg();
                    }).catch(function(e) {
                        if (e.name !== 'AbortError') self._downloadFallback(json);
                    });
                    return;
                }

                // 3차: 텍스트 공유 (파일 없이)
                if (navigator.share) {
                    navigator.share({
                        title: 'life-planner-data',
                        text: json
                    }).then(function() {
                        try { localStorage.setItem(_lsKey('lastSync'), new Date().toISOString()); } catch(x) {}
                        self._showSyncMsg();
                    }).catch(function(e) {
                        if (e.name !== 'AbortError') self._downloadFallback(json);
                    });
                    return;
                }

                self._downloadFallback(json);
            },

            // 모바일: JSON 파일 열어서 데이터 불러오기
            loadFromJsonFile: function() {
                var self = this;
                var input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = function(e) {
                    var file = e.target.files[0];
                    if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function(event) {
                        try {
                            var data = JSON.parse(event.target.result);
                            if (Array.isArray(data)) {
                                self.items = data;
                            } else if (data && data.items) {
                                self.items = data.items;
                                if (data.reflections) self.reflections = data.reflections;
                                if (data.projects) self.projects = data.projects;
                            } else {
                                alert('잘못된 형식의 파일입니다'); return;
                            }
                            try { localStorage.setItem(_lsKey('lastSync'), new Date().toISOString()); } catch(x) {}
                            self.autoSave();
                            self.render();
                            // 배너 제거
                            var bn = document.getElementById('syncBanner');
                            if (bn) bn.remove();
                            alert('✅ 데이터를 불러왔습니다. (항목 ' + self.items.length + '건)');
                        } catch(err) {
                            alert('파일 읽기 오류: ' + err.message);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            },

            // localStorage에 자동 저장
            autoSave: function() {
                var self = this;
                try {
                    localStorage.setItem(_lsKey('data'), JSON.stringify(this.items));
                    localStorage.setItem(_lsKey('reflections'), JSON.stringify(this.reflections));
                    localStorage.setItem(_lsKey('projects'), JSON.stringify(this.projects));
                    var msg = document.getElementById('autoSaveMsg');
                    if (msg) {
                        msg.style.display = 'inline';
                        msg.textContent = '✓ 저장 ' + new Date().toLocaleTimeString('ko-KR');
                        clearTimeout(this._saveTimer);
                        this._saveTimer = setTimeout(function() { msg.style.display = 'none'; }, 3000);
                    }
                } catch(e) {
                    console.warn('자동 저장 실패:', e);
                }
                // 자동 클라우드 업로드 (30초 디바운스)
                var token = localStorage.getItem('gist_token');
                var gistId = localStorage.getItem('gist_id');
                if (token && gistId) {
                    clearTimeout(this._gistUploadTimer);
                    this._gistUploadTimer = setTimeout(function() {
                        self._gistUploadSilent(token, gistId);
                    }, 30000);
                }
            },

            _gistUploadSilent: function(token, gistId) {
                var exportData = {
                    items: this.items,
                    reflections: this.reflections,
                    projects: this.projects,
                    exportDate: new Date().toISOString(),
                    device: navigator.userAgent.indexOf('Mobile') > -1 ? 'mobile' : 'PC'
                };
                fetch('https://api.github.com/gists/' + gistId, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ files: { 'life-planner-data.json': { content: JSON.stringify(exportData) } } })
                }).then(function(r) {
                    if (r.ok) {
                        var msg = document.getElementById('autoSaveMsg');
                        if (msg) {
                            msg.style.display = 'inline';
                            msg.textContent = '☁️ 자동동기화 ' + new Date().toLocaleTimeString('ko-KR');
                            setTimeout(function() { msg.style.display = 'none'; }, 3000);
                        }
                    }
                }).catch(function() { /* 실패해도 무시 — 로컬 저장은 이미 됨 */ });
            },

            _autoSyncOnLoad: function() {
                var self = this;
                var token = localStorage.getItem('gist_token');
                var gistId = localStorage.getItem('gist_id');
                if (!token || !gistId) return; // 설정 안 되어 있으면 스킵

                fetch('https://api.github.com/gists/' + gistId, {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(function(r) {
                    if (!r.ok) return;
                    return r.json();
                }).then(function(gist) {
                    if (!gist) return;
                    var file = gist.files['life-planner-data.json'];
                    if (!file) return;
                    var remote = JSON.parse(file.content);
                    if (!remote.exportDate) return;

                    var remoteTime = new Date(remote.exportDate).getTime();
                    var localSync = localStorage.getItem(_lsKey('lastSync'));
                    var localTime = localSync ? new Date(localSync).getTime() : 0;

                    // 클라우드가 더 최신이면 자동 업데이트
                    if (remoteTime > localTime + 5000) {
                        var remoteItems = Array.isArray(remote.items) ? remote.items.length : 0;
                        var localItems = self.items.length;
                        // 클라우드 데이터가 비어있으면 무시 (실수로 빈 데이터 덮어쓰기 방지)
                        if (remoteItems < 3 && localItems > 3) return;

                        if (Array.isArray(remote.items)) self.items = remote.items;
                        if (remote.reflections) self.reflections = remote.reflections;
                        if (Array.isArray(remote.projects)) self.projects = remote.projects;
                        try { localStorage.setItem(_lsKey('lastSync'), remote.exportDate); } catch(e) {}
                        self.autoSave();
                        self.render();
                        var msg = document.getElementById('autoSaveMsg');
                        if (msg) {
                            msg.style.display = 'inline';
                            msg.textContent = '📥 클라우드 자동동기화 완료';
                            setTimeout(function() { msg.style.display = 'none'; }, 4000);
                        }
                    }
                }).catch(function() { /* 네트워크 실패 시 로컬 데이터로 계속 */ });
            },

            // 현재 데이터를 "기본값"으로 localStorage에 별도 저장
            setAsDefault: function() {
                if (!confirm('현재 데이터를 기본값(초기화 시 복원되는 데이터)으로 저장하시겠습니까?')) return;
                try {
                    localStorage.setItem(_lsKey('default'), JSON.stringify(this.items));
                    localStorage.setItem(_lsKey('reflectionsDefault'), JSON.stringify(this.reflections));
                    localStorage.setItem(_lsKey('projectsDefault'), JSON.stringify(this.projects));
                    alert('✅ 현재 데이터가 기본값으로 저장되었습니다.\n\n이후 "초기화" 버튼을 누르면 이 상태로 복원됩니다.');
                } catch(e) {
                    alert('저장 실패: ' + e.message);
                }
            },

            // 초기화: 기본값이 있으면 기본값으로, 없으면 코드 내 샘플로
            resetData: function() {
                if (!confirm('데이터를 초기화하시겠습니까?\n\n📌 기본값이 저장되어 있으면 기본값으로,\n없으면 샘플 데이터로 복원됩니다.\n\n⚠️ 현재 변경사항은 사라집니다.')) return;
                this.items = [];
                var defaultData = null;
                try { defaultData = localStorage.getItem(_lsKey('default')); } catch(e) {}

                if (defaultData) {
                    try {
                        var parsed = JSON.parse(defaultData);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            this.items = parsed;
                        } else {
                            this.generateSampleData();
                        }
                    } catch(e) {
                        this.generateSampleData();
                    }
                } else {
                    this.generateSampleData();
                }
                // 성찰 데이터 초기화
                var refDefault = null;
                try { refDefault = localStorage.getItem(_lsKey('reflectionsDefault')); } catch(e) {}
                if (refDefault) {
                    try { this.reflections = JSON.parse(refDefault) || {}; } catch(e) { this.reflections = {}; }
                } else {
                    this.reflections = {};
                }
                // 프로젝트 데이터 초기화
                var projDefault = null;
                try { projDefault = localStorage.getItem(_lsKey('projectsDefault')); } catch(e) {}
                if (projDefault) {
                    try { this.projects = JSON.parse(projDefault) || []; } catch(e) { this.projects = []; }
                } else {
                    this.projects = [];
                }
                this.autoSave();
                this.render();
            },

            generateSampleData: function() {
                const categories = ['감사', '세무', '컨설팅', '평가', '실사', '사업', '자기개발', '투자', '건강', '가족', '기타'];
                let idCounter = 1;

                // Life level
                for (let i = 1; i <= 2; i++) {
                    this.items.push({
                        id: idCounter++,
                        level: 'life',
                        title: '인생목표 ' + i,
                        description: '인생 목표 설명 ' + i,
                        parent_id: null,
                        created_at: new Date().toISOString(),
                        modified_at: new Date().toISOString(),
                        target_date: null,
                        status: 'active',
                        category: categories[Math.floor(Math.random() * categories.length)],
                        tags: ['장기', '중요']
                    });
                }

                // Year level (3 items)
                for (let i = 1; i <= 3; i++) {
                    this.items.push({
                        id: idCounter++,
                        level: 'year',
                        year: 2026,
                        title: '2026년 목표 ' + i,
                        description: '2026년 연간 목표 설명 ' + i,
                        parent_id: i <= 2 ? 1 : 2,
                        created_at: new Date().toISOString(),
                        modified_at: new Date().toISOString(),
                        target_date: '2026-12-31',
                        status: 'active',
                        category: categories[Math.floor(Math.random() * categories.length)],
                        tags: ['중요']
                    });
                }

                // Month level (5 items)
                for (let i = 1; i <= 5; i++) {
                    this.items.push({
                        id: idCounter++,
                        level: 'month',
                        year: 2026,
                        month: 3,
                        title: '3월 목표 ' + i,
                        description: '3월 월간 목표 설명 ' + i,
                        parent_id: 3 + (i % 2),
                        created_at: new Date().toISOString(),
                        modified_at: new Date().toISOString(),
                        target_date: '2026-03-31',
                        status: 'active',
                        category: categories[Math.floor(Math.random() * categories.length)],
                        tags: []
                    });
                }

                // Daily level (7 items)
                for (let d = 0; d < 7; d++) {
                    const today = new Date(); today.setHours(0,0,0,0);
                    const date = new Date(today.getTime() - (6 - d) * 86400000);
                    this.items.push({
                        id: idCounter++,
                        level: 'daily',
                        year: date.getFullYear(),
                        month: date.getMonth() + 1,
                        date: date.getDate(),
                        day_summary: (date.getMonth() + 1) + '월 ' + date.getDate() + '일 일일계획',
                        mood: d === 6 ? '😄' : null,
                        reflection: d === 6 ? '좋은 하루였다' : null,
                        parent_id: 6 + (d % 2),
                        created_at: new Date().toISOString(),
                        modified_at: new Date().toISOString(),
                        target_date: this.toLocalDateStr(date),
                        status: 'active',
                        category: '기타',
                        tags: []
                    });
                }

                // Task level: 비어있음 (Task 관리 탭에서 직접 추가)
            },

            switchTab: function(tab) {
                this.currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
                event.target.classList.add('active');

                sourceYears.forEach(function(src) {
                    var newId = self._nextId();
                    var copy = {};
                    for (var k in src) { if (src.hasOwnProperty(k)) copy[k] = src[k]; }
                    copy.id = newId;
                    copy.year = toYear;
                    copy.status = 'active';
                    copy.created_at = new Date().toISOString();

                    self.items.push(copy);

                var selMM = this.selectedMonthMonth;

                var yearItems = this.items.filter(function(i) { return i.level === 'year'; });
                var monthItems = this.items.filter(function(i) { return i.level === 'month' && i.year === selMY && i.month === selMM; });
                var orphanMonths = monthItems.filter(function(m) { return !m.parent_id; });
                // 부모 연간목표도 없는 경우 체크
                var yearIds = yearItems.map(function(y) { return y.id; });

                lifeItems.forEach(function(life) {
                    // 이 인생목표에 속한 연간목표들
                    var childYears = yearItems.filter(function(y) { return y.parent_id === life.id; });
                    // 이 인생목표 아래 월간목표가 있는지 확인
                    var hasMonthItems = false;

                    });
                    if (!hasMonthItems) return;

                    // 인생목표 섹션
                    var section = document.createElement('div');

                    // 이 인생목표 아래 모든 월간목표를 하나의 그리드에 배치
                    var allChildren = [];
                    childYears.forEach(function(year) {

                // 상위 미지정
                if (orphanMonths.length > 0) {

                    var allMonthItems = self.items.filter(function(i) { return i.level === 'month'; });
                    var periodSet = {};
                    allMonthItems.forEach(function(m) {
                        var key = (m.year || 0) * 100 + (m.month || 0);
                        periodSet[key] = { year: m.year, month: m.month };
                    });
                    var periods = [];
                    for (var pk in periodSet) { periods.push(periodSet[pk]); }
                    periods.sort(function(a, b) { return (b.year * 100 + b.month) - (a.year * 100 + a.month); });

                    // 선택 월보다 이전인 가장 가까운 기간 찾기
                    var selKey = selMY * 100 + selMM;
                    var prevPeriod = null;
                    for (var pi = 0; pi < periods.length; pi++) {
                        var pKey = periods[pi].year * 100 + periods[pi].month;
                        if (pKey < selKey) { prevPeriod = periods[pi]; break; }

                        })(prevPeriod.year, prevPeriod.month);
                        emptyBox.appendChild(copyBtn);

                    // 다른 기간 목록
                    var otherPeriods = periods.filter(function(p) {
                        return !(p.year === selMY && p.month === selMM) && !(prevPeriod && p.year === prevPeriod.year && p.month === prevPeriod.month);
                    });
                    if (otherPeriods.length > 0) {

                        otherDiv.textContent = '다른 월: ';
                        otherPeriods.slice(0, 6).forEach(function(op, idx) {
                            if (idx > 0) otherDiv.appendChild(document.createTextNode(', '));
                            var link = document.createElement('a');
                            link.href = '#';
                            link.style.cssText = 'color:#6366f1;text-decoration:underline;cursor:pointer;';
                            link.textContent = op.year + '.' + op.month + '월';
                            (function(oy, om) {
                                link.onclick = function(e) { e.preventDefault(); self.copyMonthGoalsFrom(oy, om); };
                            })(op.year, op.month);
                            otherDiv.appendChild(link);
                        });
                        emptyBox.appendChild(otherDiv);
                    }

                    container.appendChild(emptyBox);
                }

                return container;
            },

                    if (sectionLabels[hour]) {

                    // Find items assigned to this hour: tasks or dailies (no-task fallback)

                                taskRow.appendChild(tRemove);

                            dailyCard.appendChild(taskListDiv);

                        orphanTasks.forEach(function(task) {

                            // 선택삭제용 체크박스

                                var cb = document.createElement('input');

                                card.ondragend = function() { this.style.opacity = '1'; };

                            // 선택삭제용 체크박스

                                    self.render(); self.markUnsaved();
                                };
                            })(daily);
                            card.appendChild(rmBtn);
                            dropZone.appendChild(card);

                    }

                    planCell.appendChild(dropZone);
                    row.appendChild(planCell);

                    // === DO cell: task-level status tracking ===

                    doCell.className = 'do-cell';

                            tasksByDaily[dailyId].tasks.forEach(function(t) { allDoItems.push(t); });

                // Helper: render inline add-task row

                    (function(pid) {
                        addBtn.onclick = function() {

                            var icon = document.createElement('span');

                            icon.style.cssText = 'font-size:16px;flex-shrink:0;';

                            saveBtn.textContent = '추가';
                            addRow.appendChild(saveBtn);

                            cancelBtn.textContent = '취소';
                            addRow.appendChild(cancelBtn);

                            function doAdd() {
                                var val = inp.value.trim();
                                if (!val) return;
                                var newId = Math.max.apply(Math, self.items.map(function(i) { return i.id; })) + 1;
                                var parentDaily = self.items.find(function(i) { return i.id === pid; });
                                self.items.push({
                                    id: newId,
                                    level: 'task',
                                    title: val,
                                    parent_id: pid,
                                    category: parentDaily ? parentDaily.category : '기타',
                                    status: 'active',
                                    do_status: null,
                                    do_note: '',
                                    target_date: dateStr,

                                    time_end: 1,

                                    created_at: new Date().toISOString(),
                                    modified_at: new Date().toISOString()
                                });

                                self.markUnsaved();

                            saveBtn.onclick = doAdd;
                            inp.onkeydown = function(e) {
                                if (e.key === 'Enter') doAdd();

                // === 프로젝트 관리 테이블 뷰 (인생목표 기준) ===
                var lifeItems = self.items.filter(function(i) { return i.level === 'life'; });

                                eTd.colSpan = 4;
                                eTd.style.cssText = 'padding:5px 8px;font-size:11px;color:#9ca3af;';
                                eTd.textContent = '(Task 없음)';
                                emptyTr.appendChild(eTd);

                                tbody.appendChild(emptyTr);
                            } else {
                                tasks.forEach(function(task, tIdx) {
                                    var tr = document.createElement('tr');
                                    tr.style.cssText = (mIdx % 2 === 0 ? 'background:#fafbff;' : 'background:#fff;') + 'transition:background 0.1s;';
                                    tr.onmouseenter = function() { tr.style.background = '#f0f4ff'; };
                                    tr.onmouseleave = function() { tr.style.background = mIdx % 2 === 0 ? '#fafbff' : '#fff'; };

                                    // 월간목표 cell (rowspan for first row of this month)

                                        var mTd = document.createElement('td');
                                        mTd.rowSpan = monthTaskCount;
                                        mTd.style.cssText = 'padding:6px 10px;font-size:12px;font-weight:700;color:#065f46;border-right:2px solid #e5e7eb;vertical-align:top;min-width:100px;background:' + (mIdx % 2 === 0 ? '#f0fdf4' : '#ecfdf5') + ';';

                                        monthRowStarted = true;

                                    if (!dailyRowStarted) {
                                        var dTd = document.createElement('td');
                                        dTd.rowSpan = dailyRowCount;
                                        dTd.style.cssText = 'padding:5px 8px;font-size:12px;font-weight:600;color:#1e3a5f;border-right:1px solid #f3f4f6;vertical-align:top;min-width:90px;';

                    var delBtn = document.createElement('button');
                    delBtn.className = 'danger';
                    delBtn.style.cssText = 'padding:4px 8px;font-size:11px;';

                    (function(proj) {
                        delBtn.onclick = function() {
                            if (!confirm('[' + proj.client + '] ' + proj.title + '\n\n이 프로젝트를 삭제하시겠습니까?')) return;
                            self.projects = self.projects.filter(function(pp) { return pp.id !== proj.id; });

                            self.markUnsaved();

                table.appendChild(tbody);
                wrap.appendChild(table);

            },

            openProjectModal: function(proj) {

                var content = document.createElement('div');

                content.style.maxWidth = '680px';

                content.innerHTML = '<div class="modal-header">' + (proj ? '✏️ 프로젝트 수정' : '💼 프로젝트 추가') + '</div>' +

                            '<option value="pending"' + (proj && proj.engaged === 'pending' ? ' selected' : '') + '>미정</option>' +
                            '<option value="yes"' + (proj && proj.engaged === 'yes' ? ' selected' : '') + '>수임</option>' +

                        '</select></div>' +

                document.getElementById('pCancelBtn').onclick = function() { modal.remove(); };

            saveProject: function() {
                var client = document.getElementById('pClient').value.trim();
                var title = document.getElementById('pTitle').value.trim();
                if (!client || !title) { alert('고객사와 프로젝트명은 필수입니다.'); return; }

                var data = {
                    client: client,
                    title: title,
                    category: document.getElementById('pCategory').value,
                    priority: document.getElementById('pPriority').value,
                    manager: document.getElementById('pManager').value.trim(),
                    contactName: document.getElementById('pContactName').value.trim(),
                    contact: document.getElementById('pContact').value.trim(),
                    status: document.getElementById('pStatus').value,
                    engaged: document.getElementById('pEngaged').value,
                    fee: document.getElementById('pFee').value,
                    startDate: document.getElementById('pStartDate').value,
                    endDate: document.getElementById('pEndDate').value,
                    progress: parseInt(document.getElementById('pProgress').value) || 0,
                    note: document.getElementById('pNote').value.trim(),
                    modified_at: new Date().toISOString()
                };

                if (this.projectEditId !== null) {
                    // 수정
                    var idx = -1;
                    for (var i = 0; i < this.projects.length; i++) {
                        if (this.projects[i].id === this.projectEditId) { idx = i; break; }
                    }
                    if (idx > -1) {
                        data.id = this.projectEditId;
                        data.created_at = this.projects[idx].created_at;
                        this.projects[idx] = data;
                    }
                } else {
                    // 추가
                    data.id = this._projNextId();
                    data.created_at = new Date().toISOString();
                    this.projects.push(data);
                }

                var modal = document.getElementById('projectModal');
                if (modal) modal.remove();
                this.render();
                this.markUnsaved();
            },

            renderStatsTab: function() {
                var self = this;
                var container = document.createElement('div');
                var dateStr = this.toLocalDateStr(this.selectedDate);

                // === 페이지 헤더 ===

                dateSelector.appendChild(dateDisplay);
                var todayBtn = document.createElement('button');
                todayBtn.className = 'secondary'; todayBtn.textContent = '오늘';
                todayBtn.onclick = function() { self.selectedDate = new Date(); self.selectedDate.setHours(0,0,0,0); self.render(); };
                dateSelector.appendChild(todayBtn);
                var nextBtn = document.createElement('button');
                nextBtn.className = 'secondary'; nextBtn.textContent = '다음 ▶';
                nextBtn.onclick = function() { self.changeDate(1); };
                dateSelector.appendChild(nextBtn);
                container.appendChild(dateSelector);

                // === 데이터 수집 (선택 날짜 기준) ===
                var dayTasks = this.items.filter(function(i) { return i.level === 'task' && i.target_date === dateStr; });
                var completedT = dayTasks.filter(function(t) { return t.do_status === 'completed'; });
                var inProgressT = dayTasks.filter(function(t) { return t.do_status === 'in_progress'; });
                var deferredT = dayTasks.filter(function(t) { return t.do_status === 'deferred'; });
                var notDoneT = dayTasks.filter(function(t) { return !t.do_status || t.do_status === 'not_done'; });
                var execRate = dayTasks.length > 0 ? Math.round((completedT.length / dayTasks.length) * 100) : 0;

                // ============================================================
                // 섹션 1: 일일 실행률 대시보드
                // ============================================================
                var sec1 = document.createElement('div');
                sec1.style.cssText = 'margin-bottom:28px;';
                var sec1Title = document.createElement('h3');
                sec1Title.style.cssText = 'font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:12px;border-bottom:2px solid #2563eb;padding-bottom:6px;';
                sec1Title.textContent = '⚡ 일일 실행률 — ' + dateStr;
                sec1.appendChild(sec1Title);

                // KPI 카드 4개
                var kpiGrid = document.createElement('div');
                kpiGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;';
                var kpis = [
                    { label: '전체 Task', value: dayTasks.length, color: '#1e3a5f', bg: '#f0f9ff' },
                    { label: '완료', value: completedT.length, color: '#065f46', bg: '#ecfdf5' },
                    { label: '진행중', value: inProgressT.length, color: '#1e40af', bg: '#eff6ff' },
                    { label: '실행률', value: execRate + '%', color: execRate >= 80 ? '#065f46' : (execRate >= 50 ? '#92400e' : '#991b1b'), bg: execRate >= 80 ? '#ecfdf5' : (execRate >= 50 ? '#fffbeb' : '#fef2f2') }
                ];
                kpis.forEach(function(k) {
                    var card = document.createElement('div');
                    card.style.cssText = 'background:' + k.bg + ';border-radius:12px;padding:16px;text-align:center;';
                    var val = document.createElement('div');
                    val.style.cssText = 'font-size:28px;font-weight:800;color:' + k.color + ';';
                    val.textContent = k.value;
                    card.appendChild(val);
                    var lbl = document.createElement('div');
                    lbl.style.cssText = 'font-size:12px;color:#6b7280;margin-top:4px;';
                    lbl.textContent = k.label;
                    card.appendChild(lbl);
                    kpiGrid.appendChild(card);
                });
                sec1.appendChild(kpiGrid);

                // 실행률 프로그레스 바
                var progressOuter = document.createElement('div');
                progressOuter.style.cssText = 'background:#e5e7eb;border-radius:10px;height:24px;overflow:hidden;position:relative;margin-bottom:8px;';
                var progressInner = document.createElement('div');
                progressInner.style.cssText = 'height:100%;border-radius:10px;transition:width 0.5s;background:linear-gradient(90deg,#10b981,#059669);width:' + execRate + '%;';
                progressOuter.appendChild(progressInner);
                var progressLabel = document.createElement('div');
                progressLabel.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1f2937;';
                progressLabel.textContent = completedT.length + ' / ' + dayTasks.length + ' 완료 (' + execRate + '%)';
                progressOuter.appendChild(progressLabel);
                sec1.appendChild(progressOuter);

                // 상태별 상세 바 (stacked)
                if (dayTasks.length > 0) {
                    var stackBar = document.createElement('div');
                    stackBar.style.cssText = 'display:flex;height:14px;border-radius:8px;overflow:hidden;margin-bottom:10px;';
                    var segments = [
                        { count: completedT.length, color: '#10b981', label: '완료' },
                        { count: inProgressT.length, color: '#3b82f6', label: '진행중' },
                        { count: notDoneT.length, color: '#f59e0b', label: '미수행' },
                        { count: deferredT.length, color: '#8b5cf6', label: '연기' }
                    ];
                    segments.forEach(function(seg) {
                        if (seg.count > 0) {
                            var s = document.createElement('div');
                            s.style.cssText = 'background:' + seg.color + ';width:' + (seg.count / dayTasks.length * 100) + '%;';
                            s.title = seg.label + ' ' + seg.count + '건';
                            stackBar.appendChild(s);
                        }
                    });
                    sec1.appendChild(stackBar);

                    // 범례
                    var legend = document.createElement('div');
                    legend.style.cssText = 'display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#374151;';
                    segments.forEach(function(seg) {
                        var item = document.createElement('span');
                        item.style.cssText = 'display:flex;align-items:center;gap:4px;';
                        var dot = document.createElement('span');
                        dot.style.cssText = 'width:10px;height:10px;border-radius:50%;background:' + seg.color + ';display:inline-block;';
                        item.appendChild(dot);
                        item.appendChild(document.createTextNode(seg.label + ' ' + seg.count + '건'));

                    });

                } else {
                    var noData = document.createElement('div');
                    noData.style.cssText = 'text-align:center;padding:20px;color:#9ca3af;font-size:13px;';
                    noData.textContent = '이 날짜에 배치된 Task가 없습니다.';
                    sec1.appendChild(noData);
                }
                container.appendChild(sec1);

                // ============================================================
                // 섹션 2: 목표 계층별 달성률 (기간별 누적)
                // ============================================================
                var sec2 = document.createElement('div');
                sec2.style.cssText = 'margin-bottom:28px;';
                var sec2Title = document.createElement('h3');
                sec2Title.style.cssText = 'font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:12px;border-bottom:2px solid #8b5cf6;padding-bottom:6px;';
                sec2Title.textContent = '🎯 목표 계층별 달성률';
                sec2.appendChild(sec2Title);

                var selYear = this.selectedDate.getFullYear();
                var selMonth = this.selectedDate.getMonth() + 1;
                var yearStr = String(selYear);
                var monthStr = yearStr + '-' + String(selMonth).padStart(2, '0');

                // 모든 태스크 (target_date 있는 것)
                var allTaskItems = self.items.filter(function(i) { return i.level === 'task' && i.target_date; });

                // 헬퍼: 태스크에서 parent chain을 타고 올라가 특정 level의 조상을 찾기
                function findAncestor(task, level) {
                    var cur = self.items.find(function(i) { return i.id === task.parent_id; });
                    while (cur) {
                        if (cur.level === level) return cur;
                        cur = self.items.find(function(i) { return i.id === cur.parent_id; });
                    }
                    return null;
                }

                // 각 계층별 설정: 기간 시작 ~ 선택 날짜까지 누적
                var levelConfig = [
                    { level: 'life',  name: '인생목표', icon: '🎯', color: '#dc2626', periodLabel: '~' + dateStr + ' 누적',

                    { level: 'year',  name: '연간목표', icon: '📅', color: '#2563eb', periodLabel: yearStr + '년 ~' + dateStr + ' 누적',
                      filter: function() { return allTaskItems.filter(function(t) { return t.target_date.substring(0,4) === yearStr && t.target_date <= dateStr; }); } },
                    { level: 'month', name: '월간목표', icon: '📆', color: '#059669', periodLabel: selMonth + '월 ~' + dateStr + ' 누적',
                      filter: function() { return allTaskItems.filter(function(t) { return t.target_date.substring(0,7) === monthStr && t.target_date <= dateStr; }); } },
                    { level: 'daily', name: '일간계획', icon: '📋', color: '#d97706', periodLabel: dateStr + ' 당일',
                      filter: function() { return dayTasks; } }
                ];

                levelConfig.forEach(function(cfg) {
                    var periodTasks = cfg.filter();
                    var lvTotal = periodTasks.length;
                    var lvCompleted = periodTasks.filter(function(t) { return t.do_status === 'completed'; }).length;
                    var rate = lvTotal > 0 ? Math.round((lvCompleted / lvTotal) * 100) : 0;

                    var row = document.createElement('div');
                    row.style.cssText = 'margin-bottom:12px;';

                    var labelRow = document.createElement('div');
                    labelRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;';
                    var labelLeft = document.createElement('span');
                    labelLeft.style.cssText = 'font-size:13px;font-weight:600;color:#374151;';
                    labelLeft.textContent = cfg.icon + ' ' + cfg.name + (lvTotal > 0 ? ' (' + lvCompleted + '/' + lvTotal + ')' : ' (해당 없음)');
                    labelRow.appendChild(labelLeft);

                    var labelRight = document.createElement('span');
                    labelRight.style.cssText = 'display:flex;align-items:center;gap:8px;';
                    var periodTag = document.createElement('span');
                    periodTag.style.cssText = 'font-size:10px;color:#6b7280;background:#f3f4f6;padding:2px 8px;border-radius:10px;';
                    periodTag.textContent = cfg.periodLabel;
                    labelRight.appendChild(periodTag);
                    var rateSpan = document.createElement('span');
                    rateSpan.style.cssText = 'font-size:13px;font-weight:700;color:' + cfg.color + ';min-width:36px;text-align:right;';
                    rateSpan.textContent = lvTotal > 0 ? rate + '%' : '-';
                    labelRight.appendChild(rateSpan);
                    labelRow.appendChild(labelRight);
                    row.appendChild(labelRow);

                    var bar = document.createElement('div');
                    bar.style.cssText = 'background:#e5e7eb;border-radius:6px;height:12px;overflow:hidden;';
                    var fill = document.createElement('div');
                    fill.style.cssText = 'height:100%;border-radius:6px;background:' + cfg.color + ';width:' + rate + '%;transition:width 0.5s;';
                    bar.appendChild(fill);
                    row.appendChild(bar);
                    sec2.appendChild(row);
                });

                // 개별 인생목표별 상세: 압축 카드 가로 배치
                var lifeItems = this.items.filter(function(i) { return i.level === 'life'; });
                if (lifeItems.length > 0) {
                    var detailTitle = document.createElement('div');
                    detailTitle.style.cssText = 'font-size:13px;font-weight:700;color:#6b7280;margin-top:14px;margin-bottom:6px;';

            _renderStatsCharts: function(dateStr, catHours) {
                var self = this;
                var excludeCats = { '식사': true, '수면': true };
                var catColors = ['#2563eb','#059669','#d97706','#dc2626','#8b5cf6','#ec4899','#06b6d4','#84cc16'];

                // 파이차트 파괴 후 재생성
                if (this.charts.statsPie) { this.charts.statsPie.destroy(); }
                var pieCtx = document.getElementById('statsPieChart');
                if (pieCtx && Object.keys(catHours).length > 0) {
                    this.charts.statsPie = new Chart(pieCtx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(catHours),
                            datasets: [{
                                data: Object.values(catHours),
                                backgroundColor: catColors.slice(0, Object.keys(catHours).length),
                                borderWidth: 2,
                                borderColor: '#fff'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                }

                // 주간 트렌드 꺾은선
                if (this.charts.statsTrend) { this.charts.statsTrend.destroy(); }
                var trendCtx = document.getElementById('statsTrendChart');
                if (trendCtx) {
                    var labels = [];
                    var rateData = [];
                    var totalData = [];
                    var completedData = [];
                    var baseDate = new Date(this.selectedDate);
                    for (var d = -6; d <= 0; d++) {
                        var dt = new Date(baseDate.getTime() + d * 86400000);
                        var ds = self.toLocalDateStr(dt);
                        labels.push((dt.getMonth() + 1) + '/' + dt.getDate());
                        var dTasks = this.items.filter(function(i) { return i.level === 'task' && i.target_date === ds && !excludeCats[i.category]; });
                        var dComp = dTasks.filter(function(t) { return t.do_status === 'completed'; });
                        totalData.push(dTasks.length);
                        completedData.push(dComp.length);
                        rateData.push(dTasks.length > 0 ? Math.round((dComp.length / dTasks.length) * 100) : 0);
                    }
                    // canvas 실제 크기 강제 설정
                    var trendParent = trendCtx.parentElement;
                    trendCtx.width = trendParent.offsetWidth || 600;
                    trendCtx.height = 300;

                    this.charts.statsTrend = new Chart(trendCtx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: '실행률 (%)',
                                    data: rateData,
                                    borderColor: '#2563eb',
                                    backgroundColor: 'rgba(37,99,235,0.1)',
                                    fill: true,
                                    tension: 0.3,
                                    yAxisID: 'y'
                                },
                                {
                                    label: '전체 Task',
                                    data: totalData,
                                    borderColor: '#d1d5db',
                                    borderDash: [5, 5],
                                    pointStyle: 'rect',
                                    tension: 0.3,
                                    yAxisID: 'y1'
                                },
                                {
                                    label: '완료 Task',
                                    data: completedData,
                                    borderColor: '#10b981',
                                    pointBackgroundColor: '#10b981',
                                    tension: 0.3,
                                    yAxisID: 'y1'
                                }
                            ]
                        },
                        options: {
                            responsive: false,
                            animation: { duration: 400 },
                            interaction: { mode: 'index', intersect: false },
                            scales: {
                                y: {
                                    type: 'linear', position: 'left',
                                    min: 0, max: 110,
                                    title: { display: true, text: '실행률 (%)' },
                                    ticks: { callback: function(v) { return v + '%'; } }
                                },
                                y1: {
                                    type: 'linear', position: 'right',
                                    min: 0,
                                    max: Math.max.apply(null, totalData) + 5,
                                    title: { display: true, text: 'Task 수' },
                                    grid: { drawOnChartArea: false }
                                }
                            },
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });
                }
            },

            },

            // 상위 경로를 배열로 반환 (최상위부터)
            getAncestorPath: function(itemId) {
                var path = [];
                var selfRef = this;
                var current = this.items.find(function(i) { return i.id === itemId; });
                while (current && current.parent_id) {
                    var parent = selfRef.items.find(function(i) { return i.id === current.parent_id; });
                    if (!parent) break;
                    path.unshift(parent);

            openAddModal: function(level, parentId, date) {
                this.editingId = null;

                document.getElementById('itemTitle').value = '';
                document.getElementById('itemDescription').value = '';

                this.renderLevelSpecificFields(level);

                document.getElementById('itemModal').classList.add('active');

            openEditModal: function(id) {
                const item = this.items.find(function(i) { return i.id === id; });
                if (!item) return;

                this.editingId = id;
                this.currentEditLevel = item.level;
                document.getElementById('itemTitle').value = item.title;
                document.getElementById('itemDescription').value = item.description || '';
                var catSelect = document.getElementById('itemCategory');
                var catCustom = document.getElementById('itemCategoryCustom');
                var catExists = Array.from(catSelect.options).some(function(o) { return o.value === item.category; });
                if (catExists && item.category !== '__custom__') {
                    catSelect.value = item.category;
                    catCustom.style.display = 'none';
                    catCustom.value = '';
                } else {
                    catSelect.value = '__custom__';
                    catCustom.style.display = 'block';
                    catCustom.value = item.category || '';
                }
                document.getElementById('itemTags').value = (item.tags || []).join(', ');
                document.getElementById('itemTargetDate').value = item.target_date || '';
                document.getElementById('itemStatus').value = item.status;

                this.renderLevelSpecificFields(item.level);

                document.getElementById('itemModal').classList.add('active');

                    yDiv.className = 'form-group';
                    yDiv.style.flex = '1';
                    var yLabel = document.createElement('label');
                    yLabel.textContent = '연도';
                    var yInput = document.createElement('input');
                    yInput.type = 'number';
                    yInput.id = 'itemYear';
                    yInput.min = '2020';
                    yInput.max = '2050';
                    yInput.value = (item && item.year) ? item.year : 2026;
                    yDiv.appendChild(yLabel);
                    yDiv.appendChild(yInput);

                    var mDiv = document.createElement('div');
                    mDiv.className = 'form-group';
                    mDiv.style.flex = '1';
                    var mLabel = document.createElement('label');
                    mLabel.textContent = '월';
                    var mInput = document.createElement('input');
                    mInput.type = 'number';
                    mInput.id = 'itemMonth';
                    mInput.min = '1';
                    mInput.max = '12';
                    mInput.value = (item && item.month) ? item.month : new Date().getMonth() + 1;
                    mDiv.appendChild(mLabel);
                    mDiv.appendChild(mInput);

                    monthRow.appendChild(yDiv);
                    monthRow.appendChild(mDiv);
                    container.appendChild(monthRow);
                }
            },

            handleCategoryChange: function() {
                var sel = document.getElementById('itemCategory');
                var customInput = document.getElementById('itemCategoryCustom');
                if (sel.value === '__custom__') {
                    customInput.style.display = 'block';
                    customInput.focus();
                } else {
                    customInput.style.display = 'none';
                    customInput.value = '';
                }
            },

            getSelectedCategory: function() {
                var sel = document.getElementById('itemCategory');
                if (sel.value === '__custom__') {
                    var custom = document.getElementById('itemCategoryCustom').value.trim();
                    return custom || '기타';
                }
                return sel.value;
            },

            closeModal: function() {
                document.getElementById('itemModal').classList.remove('active');
                document.getElementById('batchModal').classList.remove('active');
                document.getElementById('deleteModal').classList.remove('active');
                document.getElementById('itemCategoryCustom').style.display = 'none';
                document.getElementById('itemCategoryCustom').value = '';
            },

            saveItem: function() {
                var title = document.getElementById('itemTitle').value.trim();
                if (!title) {
                    alert('제목을 입력하세요');
                    return;
                }

                var now = new Date().toISOString();
                var level = this.currentEditLevel;

                // 상위 플랜 ID 가져오기
                var parentEl = document.getElementById('itemParentId');
                var parentId = parentEl ? (parentEl.value || null) : null;
                if (parentId) parentId = parseInt(parentId) || parentId;

                // 레벨별 추가 필드
                var yearEl = document.getElementById('itemYear');
                var monthEl = document.getElementById('itemMonth');
                var dateEl = document.getElementById('itemDate');
                var yearVal = yearEl ? parseInt(yearEl.value) : null;
                var monthVal = monthEl ? parseInt(monthEl.value) : null;
                var dateVal = dateEl ? dateEl.value : null;

                if (this.editingId) {
                    var editId = this.editingId;
                    var item = this.items.find(function(i) { return i.id === editId; });
                    if (item) {
                        item.title = title;
                        item.description = document.getElementById('itemDescription').value;
                        item.category = this.getSelectedCategory();
                        item.tags = document.getElementById('itemTags').value.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; });
                        item.target_date = document.getElementById('itemTargetDate').value;
                        item.status = document.getElementById('itemStatus').value;
                        item.modified_at = now;
                        if (parentId !== null) item.parent_id = parentId;
                        if (yearVal) item.year = yearVal;
                        if (monthVal) item.month = monthVal;
                        if (dateVal) item.date = dateVal;

                        // daily 날짜범위 저장
                        if (level === 'daily') {
                            var evChk = document.getElementById('itemRepeatEveryDay');
                            var rsEl = document.getElementById('itemRepeatStart');
                            var reEl = document.getElementById('itemRepeatEnd');
                            if (evChk && evChk.checked) {
                                item.repeat_mode = 'everyday';
                                item.repeat_start = '';
                                item.repeat_end = '';
                            } else {
                                item.repeat_mode = 'range';
                                item.repeat_start = rsEl ? rsEl.value : '';
                                item.repeat_end = reEl ? reEl.value : '';
                            }
                        }

                        if (level === 'task') {
                            var tsEl = document.getElementById('taskTimeStart');
                            var teEl = document.getElementById('taskTimeEnd');
                            item.time_start = tsEl ? (parseInt(tsEl.value) || null) : item.time_start;
                            item.time_end = teEl ? (parseInt(teEl.value) || null) : item.time_end;
                        }
                    }
                } else {
                    var newId = Math.max.apply(Math, this.items.map(function(i) { return i.id; })) + 1;
                    var newItem = {
                        id: newId,
                        level: level,
                        title: title,
                        description: document.getElementById('itemDescription').value,
                        parent_id: parentId,
                        created_at: now,
                        modified_at: now,
                        target_date: document.getElementById('itemTargetDate').value,
                        status: document.getElementById('itemStatus').value,
                        category: this.getSelectedCategory(),
                        tags: document.getElementById('itemTags').value.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; })
                    };

                    if (level === 'year') { newItem.year = yearVal || 2026; }
                    if (level === 'month') { newItem.year = yearVal || 2026; newItem.month = monthVal || 1; }
                    if (level === 'daily') {
                        newItem.date = dateVal || '';
                        newItem.mood = 'neutral';
                        newItem.reflection = '';
                        newItem.day_summary = '';
                        var evChk2 = document.getElementById('itemRepeatEveryDay');
                        var rsEl2 = document.getElementById('itemRepeatStart');
                        var reEl2 = document.getElementById('itemRepeatEnd');
                        if (evChk2 && evChk2.checked) {
                            newItem.repeat_mode = 'everyday';
                            newItem.repeat_start = '';
                            newItem.repeat_end = '';
                        } else {
                            newItem.repeat_mode = 'range';
                            newItem.repeat_start = rsEl2 ? rsEl2.value : '';
                            newItem.repeat_end = reEl2 ? reEl2.value : '';
                        }
                    }
                    if (level === 'task') {
                        var tsEl2 = document.getElementById('taskTimeStart');
                        var teEl2 = document.getElementById('taskTimeEnd');
                        newItem.time_start = tsEl2 ? (parseInt(tsEl2.value) || null) : null;
                        newItem.time_end = teEl2 ? (parseInt(teEl2.value) || null) : null;
                        newItem.do_status = 'not_done';
                        newItem.do_note = '';
                        newItem.priority = 'medium';
                    }

                    this.items.push(newItem);
                }

                this.closeModal();
                this.render();
                this.markUnsaved();
            },

            openBatchModal: function(level, parentId) {
                this.batchParentId = parentId;
                this.currentBatchLevel = level;

                const info = document.getElementById('batchParentInfo');
                info.innerHTML = '';

                if (parentId) {
                    const parent = this.items.find(function(i) { return i.id === parentId; });
                    if (parent) {
                        const p = document.createElement('p');
                        p.style.marginBottom = '12px';
                        p.style.fontSize = '14px';
                        p.textContent = '상위 항목: ' + parent.title;
                        info.appendChild(p);
                    }
                }

                document.getElementById('batchInput').value = '';
                document.getElementById('batchModal').classList.add('active');
            },

            previewBatch: function() {
                const input = document.getElementById('batchInput').value;
                const lines = input.split('\n').filter(function(l) { return l.trim(); });
                const items = lines.map(function(line) {
                    const parts = line.split('|').map(function(p) { return p.trim(); });
                    return {
                        title: parts[0],
                        description: parts[1] || '',
                        category: parts[2] || '기타'
                    };
                });

                alert(items.length + '개의 항목이 생성될 예정입니다:\n\n' + items.map(function(i) { return i.title; }).join('\n'));
            },

            saveBatch: function() {
                const input = document.getElementById('batchInput').value;
                const lines = input.split('\n').filter(function(l) { return l.trim(); });
                const now = new Date().toISOString();
                let newId = Math.max.apply(Math, this.items.map(function(i) { return i.id; })) + 1;

                const self = this;
                lines.forEach(function(line) {
                    const parts = line.split('|').map(function(p) { return p.trim(); });
                    const item = {
                        id: newId++,
                        level: self.currentBatchLevel,
                        title: parts[0],
                        description: parts[1] || '',
                        parent_id: self.batchParentId || null,
                        created_at: now,
                        modified_at: now,
                        target_date: null,
                        status: 'active',
                        category: parts[2] || '기타',
                        tags: []
                    };

                    self.items.push(item);
                });

                this.closeModal();
                this.render();
                this.markUnsaved();
            },

            openDeleteModal: function(id) {
                const item = this.items.find(function(i) { return i.id === id; });
                if (!item) return;

                const children = this.items.filter(function(i) { return i.parent_id === id; });
                const msg = document.getElementById('deleteMessage');

                if (children.length > 0) {
                    msg.textContent = '\'' + item.title + '\' 항목에 ' + children.length + '개의 하위 항목이 있습니다. 항목을 삭제하시겠습니까?';
                } else {
                    msg.textContent = '\'' + item.title + '\' 항목을 삭제하시겠습니까?';
                }

                this.deleteTargetId = id;
                document.getElementById('deleteModal').classList.add('active');
            },

            confirmDelete: function() {
                if (!this.deleteTargetId) return;

                var delId = this.deleteTargetId;
                const item = this.items.find(function(i) { return i.id === delId; });
                if (item) {
                    const children = this.items.filter(function(i) { return i.parent_id === item.id; });
                    const self = this;
                    if (children.length > 0) {
                        children.forEach(function(child) {
                            const idx = self.items.indexOf(child);
                            if (idx > -1) self.items.splice(idx, 1);
                        });
                    }

                    const idx = this.items.indexOf(item);
                    if (idx > -1) this.items.splice(idx, 1);
                }

                this.closeModal();
                this.render();
                this.markUnsaved();
            },

            // Plan entry modal state
            _pendingDrop: null,

            _nextId: function() {
                return Math.max.apply(Math, this.items.map(function(i) { return i.id; })) + 1;
            },

            _cloneItem: function(src, overrides) {
                var copy = {};
                for (var k in src) { if (src.hasOwnProperty(k)) copy[k] = src[k]; }
                copy.id = this._nextId();
                copy.do_status = null;
                copy.do_note = '';
                copy.created_at = new Date().toISOString();
                copy.modified_at = new Date().toISOString();
                for (var o in overrides) { if (overrides.hasOwnProperty(o)) copy[o] = overrides[o]; }
                return copy;
            },

            handleDrop: function(event, hour, dateStr) {
                event.preventDefault();
                var self = this;
                var rawData = event.dataTransfer.getData('text/plain');
                var isCopy = event.ctrlKey || event.metaKey; // Ctrl(Win) / Cmd(Mac) = 복사

                // === 그룹(daily + 하위 태스크 전체) ===
                if (rawData.indexOf('move-group:') === 0) {
                    var parts = rawData.split(':');
                    var dailyId = parseInt(parts[1]);
                    var fromHour = parseInt(parts[2]);
                    var targetTasks = this.items.filter(function(t) {
                        return t.level === 'task' && t.parent_id === dailyId && t.time_start === fromHour && t.target_date === dateStr;
                    });
                    if (isCopy) {
                        // 복사: 기존은 유지, 복제본을 새 시간에 생성
                        targetTasks.forEach(function(t) {
                            self.items.push(self._cloneItem(t, { time_start: hour, time_end: hour + 1 }));
                        });
                    } else {
                        // 이동
                        targetTasks.forEach(function(t) {
                            t.time_start = hour;
                            t.time_end = hour + 1;
                        });
                    }
                    this.render();
                    this.markUnsaved();
                    return;
                }

                // === 개별 태스크 ===
                if (rawData.indexOf('move-task:') === 0) {
                    var taskId = parseInt(rawData.split(':')[1]);
                    var task = this.items.find(function(i) { return i.id === taskId; });
                    if (task) {
                        if (isCopy) {
                            this.items.push(this._cloneItem(task, { time_start: hour, time_end: hour + 1, target_date: dateStr }));
                        } else {
                            task.time_start = hour;
                            task.time_end = hour + 1;
                            task.target_date = dateStr;
                        }
                    }
                    this.render();
                    this.markUnsaved();
                    return;
                }

                // === 태스크 없는 daily ===
                if (rawData.indexOf('move-daily:') === 0) {
                    var dId = parseInt(rawData.split(':')[1]);
                    var daily = this.items.find(function(i) { return i.id === dId; });
                    if (daily) {
                        if (isCopy) {
                            this.items.push(this._cloneItem(daily, { time_start: hour, time_end: hour + 1, target_date: dateStr }));
                        } else {
                            daily.time_start = hour;
                            daily.time_end = hour + 1;
                            daily.target_date = dateStr;
                        }
                    }
                    this.render();
                    this.markUnsaved();
                    return;
                }

                // === 새 배치: 할일 박스에서 드래그 ===
                var itemId = parseInt(rawData);
                var item = this.items.find(function(i) { return i.id === itemId; });
                if (!item) return;

                if (item.level === 'daily') {
                    // Show plan entry modal: user types what they'll do
                    this._pendingDrop = { dailyId: item.id, hour: hour, dateStr: dateStr };
                    this.showPlanEntryModal(item, hour);
                }
            },

            showPlanEntryModal: function(daily, hour) {
                var hourStr = String(hour).padStart(2, '0') + ':00';
                document.getElementById('planEntryDailyName').textContent = '📋 ' + daily.title + ' → ' + hourStr + ' 배치';
                document.getElementById('planEntryText').value = '';
                document.getElementById('planEntryModal').classList.add('active');
                setTimeout(function() { document.getElementById('planEntryText').focus(); }, 100);
            },

            closePlanEntryModal: function() {
                document.getElementById('planEntryModal').classList.remove('active');
                this._pendingDrop = null;
            },

            confirmPlanEntryDirect: function() {
                var pending = this._pendingDrop;
                if (!pending) return;

                var daily = this.items.find(function(i) { return i.id === pending.dailyId; });
                if (!daily) return;

                // 일계획 제목 그대로 태스크로 생성
                var newId = Math.max.apply(Math, this.items.map(function(i) { return i.id; })) + 1;
                this.items.push({
                    id: newId,
                    level: 'task',
                    title: daily.title,
                    parent_id: pending.dailyId,
                    category: daily.category || '기타',
                    status: 'active',
                    do_status: null,
                    do_note: '',
                    target_date: pending.dateStr,
                    time_start: pending.hour,
                    time_end: pending.hour + 1,
                    description: '',
                    created_at: new Date().toISOString(),
                    modified_at: new Date().toISOString()
                });

                this.closePlanEntryModal();
                this.render();
                this.markUnsaved();
            },

            confirmPlanEntry: function() {
                var pending = this._pendingDrop;
                if (!pending) return;

                var text = document.getElementById('planEntryText').value.trim();
                if (!text) {
                    alert('할 일 내용을 입력하세요.');
                    return;
                }

                var daily = this.items.find(function(i) { return i.id === pending.dailyId; });
                if (!daily) return;

                // Create a plan_entry item (lightweight task created at drop time)
                var newId = Math.max.apply(Math, this.items.map(function(i) { return i.id; })) + 1;
                this.items.push({
                    id: newId,
                    level: 'task',
                    title: text,
                    parent_id: pending.dailyId,
                    category: daily.category || '기타',
                    status: 'active',
                    do_status: null,
                    do_note: '',
                    target_date: pending.dateStr,
                    time_start: pending.hour,
                    time_end: pending.hour + 1,
                    description: '',
                    created_at: new Date().toISOString(),
                    modified_at: new Date().toISOString()
                });

                this.closePlanEntryModal();
                this.render();
                this.markUnsaved();
            },

            changeDate: function(days) {
                this.selectedDate = new Date(this.selectedDate.getTime() + days * 24 * 60 * 60 * 1000);
                this.render();
            },

            // 로컬 시간 기준 YYYY-MM-DD (UTC 변환 없이)
            toLocalDateStr: function(date) {
                var y = date.getFullYear();
                var m = ('0' + (date.getMonth() + 1)).slice(-2);
                var d = ('0' + date.getDate()).slice(-2);
                return y + '-' + m + '-' + d;
            },

            formatDateKo: function(date) {
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
                const dayName = dayNames[date.getDay()];
                return year + '년 ' + month + '월 ' + day + '일 (' + dayName + ')';
            },

            markUnsaved: function() {
                document.getElementById('saveBadge').classList.remove('active');
                this.autoSave();
            },

            saveToFile: function() {
                var exportData = {
                    items: this.items,
                    reflections: this.reflections,
                    projects: this.projects,
                    exportDate: new Date().toISOString()
                };
                const json = JSON.stringify(exportData, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'life-planner-' + this.toLocalDateStr(new Date()) + '.json';
                a.click();
                URL.revokeObjectURL(url);

                document.getElementById('saveBadge').classList.remove('active');
            },

            importFromFile: function() {
                const fileInput = document.getElementById('fileInput');
                const self = this;
                fileInput.onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = function(event) {
                        try {
                            const imported = JSON.parse(event.target.result);
                            // 새 형식 (객체) 또는 구 형식 (배열) 모두 지원
                            if (Array.isArray(imported)) {
                                self.items = imported;
                            } else if (imported && imported.items) {
                                self.items = imported.items;
                                if (imported.reflections) self.reflections = imported.reflections;
                                if (imported.projects) self.projects = imported.projects;
                            } else {
                                alert('잘못된 형식의 파일입니다');
                                return;
                            }
                            self.autoSave();
                            self.render();
                            alert('데이터를 불러왔습니다');
                        } catch (err) {
                            alert('파일을 읽는 중 오류가 발생했습니다');
                        }
                    };
                    reader.readAsText(file);
                };
                fileInput.click();
            }
        };

        document.addEventListener('DOMContentLoaded', function() { app.init(); });

        // 드래그 중 자동 스크롤
        (function() {
            var scrollSpeed = 0;
            var scrollRAF = null;
            var EDGE = 80; // 화면 상/하단 80px 영역에서 스크롤 시작
            var MAX_SPEED = 18;

            function doScroll() {
                if (scrollSpeed !== 0) {
                    window.scrollBy(0, scrollSpeed);
                    scrollRAF = requestAnimationFrame(doScroll);
                }
            }

            document.addEventListener('dragover', function(e) {
                var y = e.clientY;
                var h = window.innerHeight;

                if (y < EDGE) {
                    // 상단 근접 → 위로 스크롤
                    scrollSpeed = -Math.round(MAX_SPEED * (1 - y / EDGE));
                } else if (y > h - EDGE) {
                    // 하단 근접 → 아래로 스크롤
                    scrollSpeed = Math.round(MAX_SPEED * (1 - (h - y) / EDGE));
                } else {
                    scrollSpeed = 0;
                }

                if (scrollSpeed !== 0 && !scrollRAF) {
                    scrollRAF = requestAnimationFrame(doScroll);
                } else if (scrollSpeed === 0 && scrollRAF) {
                    cancelAnimationFrame(scrollRAF);
                    scrollRAF = null;
                }
            });

            document.addEventListener('dragend', function() {
                scrollSpeed = 0;
                if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }
            });

            document.addEventListener('drop', function() {
                scrollSpeed = 0;
                if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }
            });
        })();
    </script>
